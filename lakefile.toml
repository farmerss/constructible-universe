name = "Constructible"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["Constructible"]
lintDriver = "Batteries.Linter.lint"

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[lean_exe]]
name = "extract_blueprint"
package = "LeanArchitect"
root = "Architect.Extract"
supportInterpreter = true

[[require]]
name = "LeanArchitect"
git = "https://github.com/hanwenzhu/LeanArchitect"
rev = "main"

[[require]]
name = "checkdecls"
git = "https://github.com/PatrickMassot/checkdecls.git"

[[require]]
name = "«doc-gen4»"
git = "https://github.com/leanprover/doc-gen4"
rev = "main"


[[lean_lib]]
name = "Constructible"
roots = ["Constructible"]

[[require]]
name = "mathlib"
scope = "leanprover-community"